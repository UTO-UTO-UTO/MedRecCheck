name: 病历评分 & 部署

on:
  schedule:
    # 北京时间每天 08:30 (UTC+8 → UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  score-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 恢复登录态缓存
        uses: actions/cache@v4
        id: cache-state
        with:
          path: .tmp/state.json
          key: medrec-auth-state-v1

      - name: 登录 & 抓取病历
        env:
          MEDREC_USERNAME: ${{ secrets.MEDREC_USERNAME }}
          MEDREC_PASSWORD: ${{ secrets.MEDREC_PASSWORD }}
          MEDREC_HEADLESS: 'true'
        run: python scripts/crawl_records.py

      - name: 评分
        run: python scripts/score_records.py

      - name: 生成报告
        run: python scripts/generate_report.py

      - name: 准备部署文件
        run: |
          mkdir -p gh-pages-staging
          cp .tmp/report.html gh-pages-staging/index.html

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-staging
          publish_branch: gh-pages
          force_orphan: true
          commit_message: '更新报告 ${{ github.event.repository.updated_at }}'
