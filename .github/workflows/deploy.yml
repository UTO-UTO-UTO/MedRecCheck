name: 病历评分 & 部署

on:
  schedule:
    # 北京时间每天 22:00 (UTC+8 → UTC 14:00)
    - cron: '00 14 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  score-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 恢复登录态缓存
        uses: actions/cache@v4
        id: cache-state
        with:
          path: .tmp/state.json
          key: medrec-auth-state-v1

      - name: 登录 & 抓取病历
        id: crawl
        env:
          MEDREC_USERNAME: ${{ secrets.MEDREC_USERNAME }}
          MEDREC_PASSWORD: ${{ secrets.MEDREC_PASSWORD }}
          MEDREC_HEADLESS: 'true'
          MEDREC_TIMEOUT: '90000'
        run: |
          for i in 1 2; do
            echo "[deploy] 第 $i 次尝试抓取..."
            if python scripts/crawl_records.py; then
              echo "[deploy] 抓取成功"
              echo "crawl_ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ $i -lt 2 ]; then
              echo "[deploy] 失败，30 秒后重试..."
              sleep 30
            fi
          done
          echo "[deploy] 两次尝试均失败"
          echo "crawl_ok=false" >> "$GITHUB_OUTPUT"
          exit 1
        continue-on-error: true

      - name: 检查抓取结果
        run: |
          if [ "${{ steps.crawl.outcome }}" != "success" ]; then
            echo "[deploy] 远程抓取失败（可能需验证码），检查是否有历史数据可继续..."
            if [ -f .tmp/records.json ] && [ -s .tmp/records.json ]; then
              echo "[deploy] 存在历史病历数据，继续评分"
            else
              echo "[deploy] 无可用病历数据，终止流程"
              exit 0
            fi
          else
            echo "[deploy] 抓取成功，继续评分"
          fi

      - name: 评分
        run: python scripts/score_records.py

      - name: 生成报告
        run: python scripts/generate_report.py

      - name: 准备部署文件
        run: |
          mkdir -p gh-pages-staging
          cp .tmp/report.html gh-pages-staging/index.html

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-staging
          publish_branch: gh-pages
          force_orphan: true
          commit_message: '更新报告 $(date -u +"%Y-%m-%d %H:%M UTC")'
